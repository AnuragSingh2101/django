{% extends "layout.html" %}

{% block title %}
    Coding Detail Page
{% endblock %}

{% block Content %}
    <div class="container mx-auto p-8">
        <div class="bg-white shadow-lg rounded-lg p-6">
            <h1 class="text-4xl font-semibold text-center text-gray-800 mb-4">Coding Detail</h1>

            <div class="bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 p-4 rounded-md mb-6">
                <h3 class="text-3xl font-bold text-white">{{ coding.name }}</h3>
                <p class="text-lg text-gray-100 mt-2">{{ coding.description }}</p>
            </div>

            <!-- Optionally add more details or actions (like buttons) -->
            <div class="flex justify-center mt-4">
                <a href="#" class="text-white bg-blue-500 hover:bg-blue-700 px-6 py-2 rounded-lg text-lg transition duration-300">View More Details</a>
            </div>
        </div>
    </div>
{% endblock %}
